# ============================================================
# GitHub Actions Workflow for Terraform
# Trigger: Manual (workflow_dispatch) on main branch
# ============================================================

name: Terraform Plan/Apply

# workflow_dispatch = manual trigger from GitHub UI

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to perform"
        required: true
        type: choice
        options:
          - plan # Preview changes
          - apply # applies config
        default: "plan"

# ENVIRONMENT VARIABLES
env:
  TF_LOG: INFO
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{vars.AWS_REGION }}

# JOBS
jobs:
  terraform:
    name: "Terraform ${{ github.event.inputs.action }}"
    runs-on: ubuntu-latest

    # Set the working directory for all run steps in this job
    defaults:
      run:
        working-directory: day09(cloudfront_s3_hosting)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Uses HashiCorp's official action to install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.6

      # Terraform Init
      - name: Terraform Init
        run: terraform init

      # Terraform Format Check
      - name: Terraform Format Check
        run: terraform fmt -check

      # Terraform Validate
      - name: Terraform Validate
        run: terraform validate

      # Terraform Plan
      - name: Terraform Plan
        run: terraform plan -no-color -input=false

      # Terraform Apply
      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -input=false
